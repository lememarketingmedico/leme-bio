services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: leme_bio
      POSTGRES_USER: leme_bio
      POSTGRES_PASSWORD: leme_bio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
